name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: ccpaid-darwin-arm64
            target: bun-darwin-arm64
            runner: macos-14
            smoke-test: true
          - asset: ccpaid-darwin-x64
            target: bun-darwin-x64
            runner: macos-13
            smoke-test: true
          - asset: ccpaid-linux-x64
            target: bun-linux-x64
            runner: ubuntu-latest
            smoke-test: true
          - asset: ccpaid-linux-arm64
            target: bun-linux-arm64
            runner: ubuntu-latest
            smoke-test: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build ./ccpaid.ts --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.asset }}

      - name: Verify binary starts
        if: matrix.smoke-test
        run: ./dist/${{ matrix.asset }} -h

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ccpaid-* > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ccpaid-*
            dist/checksums.txt
          generate_release_notes: true
